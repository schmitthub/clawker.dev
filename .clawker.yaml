agent:
  from_env:
    - GH_TOKEN
    - CONTEXT7_API_KEY
  post_init: |
    claude mcp add -s local serena -- uvx --from git+https://github.com/oraios/serena@ad7cf51ec3cd69f4e1cc6d2eab679f8876897b7a serena start-mcp-server --context claude-code --project "$(pwd)" --enable-web-dashboard false
    claude mcp add -s user -t http deepwiki https://mcp.deepwiki.com/mcp
    npx ctx7 setup --claude --api-key "$CONTEXT7_API_KEY" --yes
  pre_run: |
    npm install
build:
  image: buildpack-deps:bookworm-scm
  instructions:
    root_run:
      - |-
        GH_VERSION=2.92.0 && \
          ARCH=$(dpkg --print-architecture) && \
          GH_FILE="gh_${GH_VERSION}_linux_${ARCH}.tar.gz" && \
          CHECKSUMS_FILE="gh_${GH_VERSION}_checksums.txt" && \
          curl -fsSLO "https://github.com/cli/cli/releases/download/v${GH_VERSION}/${GH_FILE}" && \
          curl -fsSLO "https://github.com/cli/cli/releases/download/v${GH_VERSION}/${CHECKSUMS_FILE}" && \
          grep " ${GH_FILE}\$" "${CHECKSUMS_FILE}" | sha256sum -c - && \
          tar -C /usr/local -xzf "${GH_FILE}" --strip-components=1 && \
          rm -f "${GH_FILE}" "${CHECKSUMS_FILE}"
    user_run:
      - npm install -g pnpm typescript
      - curl -LsSf https://astral.sh/uv/install.sh | sh
  packages:
    - ripgrep
security:
  docker_socket: true
  firewall:
    add_domains:
      - github.com
      - api.github.com
    rules:
      - action: allow
        dst: github.com
        insecure_skip_tls_verify: false
        port: "22"
        proto: ssh
