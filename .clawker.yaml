# yaml-language-server: $schema=https://raw.githubusercontent.com/schmitthub/clawker/0b5284e028808da0be83a2753624524df809bcc6/docs/schemas/clawker.schema.json
agent:
  env_file:
    - .env
  from_env:
    - GH_TOKEN
    - CONTEXT7_API_KEY
  pre_run: |
    if [ -f pnpm-lock.yaml ]; then
      pnpm install
    elif [ -f package-lock.json ]; then
      npm ci
    elif [ -f package.json ]; then
      npm install
    fi
harnesses:
  claude:
    post_init: |
      claude mcp add -s local serena -- uvx --from git+https://github.com/oraios/serena@ad7cf51ec3cd69f4e1cc6d2eab679f8876897b7a serena start-mcp-server --context claude-code --project "$(pwd)" --enable-web-dashboard false
      claude mcp add -s user -t http deepwiki https://mcp.deepwiki.com/mcp
      npx ctx7 setup --claude --api-key "$CONTEXT7_API_KEY" --yes
build:
  stacks: ['python', 'node']
  harness: claude
  instructions:
    root_run:
      - |-
        GH_VERSION=2.95.0 && \
          ARCH=$(dpkg --print-architecture) && \
          GH_FILE="gh_${GH_VERSION}_linux_${ARCH}.tar.gz" && \
          CHECKSUMS_FILE="gh_${GH_VERSION}_checksums.txt" && \
          curl -fsSLO "https://github.com/cli/cli/releases/download/v${GH_VERSION}/${GH_FILE}" && \
          curl -fsSLO "https://github.com/cli/cli/releases/download/v${GH_VERSION}/${CHECKSUMS_FILE}" && \
          grep " ${GH_FILE}\$" "${CHECKSUMS_FILE}" | sha256sum -c - && \
          tar -C /usr/local -xzf "${GH_FILE}" --strip-components=1 && \
          rm -f "${GH_FILE}" "${CHECKSUMS_FILE}"
      # brand fonts (Clash Display, Satoshi, Inter) for og-image / SVG-to-PNG rendering
      - |-
        mkdir -p /usr/local/share/fonts/brand && cd /tmp && \
          curl -fsSL -o clash-display.zip "https://api.fontshare.com/v2/fonts/download/clash-display" && \
          curl -fsSL -o satoshi.zip "https://api.fontshare.com/v2/fonts/download/satoshi" && \
          unzip -oj clash-display.zip '*.otf' -d /usr/local/share/fonts/brand && \
          unzip -oj satoshi.zip '*.otf' -d /usr/local/share/fonts/brand && \
          curl -fsSL -o /usr/local/share/fonts/brand/Inter-Variable.ttf \
            "https://raw.githubusercontent.com/google/fonts/main/ofl/inter/Inter%5Bopsz%2Cwght%5D.ttf" && \
          rm -f clash-display.zip satoshi.zip && \
          fc-cache -f
    user_run:
      - npm install -g pnpm typescript
      - curl -LsSf https://astral.sh/uv/install.sh | sh
      - uv tool install pre-commit --with pre-commit-uv
  packages:
    - ripgrep
    - jq
    - fontconfig
    - unzip
security:
  docker_socket: true
  firewall:
    add_domains:
      - github.com
      - api.github.com
      - mcp.deepwiki.com
      - mcp.context7.com
      - context7.com
      - pypi.org
      - files.pythonhosted.org
      - registry-1.docker.io
      - astral.sh
      - docs.astro.build
      # live site + docs, for post-deploy verification
      - clawker.dev
      - www.clawker.dev
      - docs.clawker.dev
    rules:
      - action: allow
        dst: github.com
        insecure_skip_tls_verify: false
        port: "22"
        proto: ssh
      # brand font binaries (Clash Display, Satoshi) for og-image rendering
      - dst: cdn.fontshare.com
        proto: https
      # Fontshare zip download endpoint (build-time font install)
      - dst: api.fontshare.com
        proto: https
        path_rules:
          - path: /v2/fonts/download/
            action: allow
      # Google Fonts TTFs (Inter) — scoped to the google/fonts repo only
      - dst: raw.githubusercontent.com
        proto: https
        path_rules:
          - path: /google/fonts/
            action: allow
monitoring: 
  extensions: claude-code